name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features

  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --workspace

  frontend:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      - run: pnpm --dir app install --frozen-lockfile
      - run: pnpm --dir app check
      - run: pnpm --dir app test
      - run: pnpm --dir app build

  deny:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2

  bundle:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    # Needed for the "Publish GitHub Release" step to create/update a release.
    permissions:
      contents: write
    # Code signing is GATED on a repo secret (Phase 7.6 R4 / D13). When
    # WINDOWS_CERT_BASE64 (a base64-encoded PFX) + WINDOWS_CERT_PASSWORD are set,
    # the "Set up Windows code signing" step imports the cert and `cargo tauri
    # build` signs the installer (Tauri reads the non-secret thumbprint from
    # tauri.conf.json's bundle.windows.certificateThumbprint — see CLAUDE.md
    # "Release"). With NO secret the step is skipped and v1 ships UNSIGNED; the
    # job stays green either way. Activating signing is a config + secret flip,
    # not a rewrite.
    env:
      WINDOWS_CERT_BASE64: ${{ secrets.WINDOWS_CERT_BASE64 }}
      WINDOWS_CERT_PASSWORD: ${{ secrets.WINDOWS_CERT_PASSWORD }}
    steps:
      - uses: actions/checkout@v4
      - uses: Swatinem/rust-cache@v2
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          cache-dependency-path: app/pnpm-lock.yaml
      # node_modules must exist for tauri.conf.json's beforeBuildCommand (pnpm build).
      - run: pnpm --dir app install --frozen-lockfile
      - run: cargo install tauri-cli --version "^2.0" --locked
      # Gated signing: import the PFX into the per-user cert store iff the secret
      # is present. No secret → skipped → unsigned build (v1's default path).
      - name: Set up Windows code signing (gated on a secret)
        if: ${{ env.WINDOWS_CERT_BASE64 != '' }}
        shell: pwsh
        run: |
          $pfx = [System.Convert]::FromBase64String($env:WINDOWS_CERT_BASE64)
          $path = Join-Path $env:RUNNER_TEMP 'kith-signing.pfx'
          [System.IO.File]::WriteAllBytes($path, $pfx)
          $password = ConvertTo-SecureString $env:WINDOWS_CERT_PASSWORD -AsPlainText -Force
          Import-PfxCertificate -FilePath $path -CertStoreLocation Cert:\CurrentUser\My -Password $password
          Remove-Item $path
      # Run from the Tauri crate so the CLI finds tauri.conf.json (CLAUDE.md wiring).
      - run: cargo tauri build
        working-directory: crates/kith-tauri
      - uses: actions/upload-artifact@v4
        with:
          name: kith-windows-installer
          path: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          if-no-files-found: error
      # On a v* tag push, publish a GitHub Release with the installers attached
      # (built here on the runner — nothing is downloaded/re-uploaded by hand).
      # A pre-release tag (e.g. v1.0.0-rc.1, a name with a hyphen) is marked as a
      # pre-release automatically. Body is left empty (no generated notes).
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          name: Kith ${{ github.ref_name }}
          files: |
            target/release/bundle/nsis/*.exe
            target/release/bundle/msi/*.msi
          fail_on_unmatched_files: true
